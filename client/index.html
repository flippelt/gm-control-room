<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5a0a0a" />
    <link rel="icon" type="image/svg+xml" href="/icons/d20.svg" />
    <!-- iOS instalável (Add to Home Screen): o iOS ignora SVG em apple-touch-icon,
         então usamos PNG 180x180 com fundo opaco. As metas apple-* dão standalone
         confiável em iOS < 16.4; em 16.4+ o display:standalone do manifest já basta. -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GMCR Display" />
    <title>GM Control Room</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Bordas onduladas do pergaminho (cenas medievais) — filter: url(#wavy) -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <filter id="wavy">
        <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="7" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
