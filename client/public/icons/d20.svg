<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="d20">
  <!-- D20 (icosaedro visto de frente): silhueta hexagonal com 10 faces
       triangulares visíveis, sombreadas de cima (claras) p/ baixo (escuras),
       e o "20" na face central. Fundo transparente (favicon / ícone SVG). -->
  <g stroke="#3a0606" stroke-width="2.5" stroke-linejoin="round">
    <!-- borda (rim) -->
    <polygon points="74,151 256,46 256,150"  fill="#c93030"/>
    <polygon points="256,46 438,151 256,150" fill="#d23434"/>
    <polygon points="438,151 350,312 438,361" fill="#9c2222"/>
    <polygon points="438,361 350,312 256,466" fill="#841c1c"/>
    <polygon points="256,466 162,312 74,361"  fill="#841c1c"/>
    <polygon points="74,361 162,312 74,151"   fill="#9c2222"/>
    <!-- 2º anel (adjacentes ao centro) -->
    <polygon points="438,151 256,150 350,312" fill="#b82a2a"/>
    <polygon points="256,466 350,312 162,312" fill="#7a1818"/>
    <polygon points="74,151 162,312 256,150"  fill="#b82a2a"/>
    <!-- face central (o "20") -->
    <polygon points="256,150 350,312 162,312" fill="#e23b3b"/>
  </g>

  <!-- contorno externo do dado p/ definir a silhueta -->
  <polygon points="256,46 438,151 438,361 256,466 74,361 74,151"
    fill="none" stroke="#240000" stroke-width="6" stroke-linejoin="round"/>

  <!-- "20" na face central -->
  <text x="256" y="266"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="108" font-weight="700"
    fill="#fff2d8" stroke="#5a0a0a" stroke-width="3" paint-order="stroke"
    text-anchor="middle" dominant-baseline="middle">20</text>
</svg>
