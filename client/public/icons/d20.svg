<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="d20">
  <!-- D20 vermelho estilizado. Triângulo central representa a face superior;
       triângulos laterais representam as faces visíveis adjacentes. -->
  <defs>
    <linearGradient id="g-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e94545"/>
      <stop offset="1" stop-color="#a02020"/>
    </linearGradient>
    <linearGradient id="g-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a1313"/>
      <stop offset="1" stop-color="#c02828"/>
    </linearGradient>
    <linearGradient id="g-right" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a1313"/>
      <stop offset="1" stop-color="#c02828"/>
    </linearGradient>
  </defs>

  <!-- Hexágono externo (silhueta do d20 visto em isométrico) -->
  <polygon
    points="256,32 472,160 472,352 256,480 40,352 40,160"
    fill="#5a0a0a"
    stroke="#240000"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!-- Face superior central (triângulo) -->
  <polygon
    points="256,80 416,176 256,272 96,176"
    fill="url(#g-top)"
    stroke="#240000"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Face inferior esquerda -->
  <polygon
    points="96,176 256,272 256,448 64,336"
    fill="url(#g-left)"
    stroke="#240000"
    stroke-width="4"
    stroke-linejoin="round"
    opacity="0.92"
  />

  <!-- Face inferior direita -->
  <polygon
    points="416,176 256,272 256,448 448,336"
    fill="url(#g-right)"
    stroke="#240000"
    stroke-width="4"
    stroke-linejoin="round"
    opacity="0.92"
  />

  <!-- "20" centralizado na face superior -->
  <text
    x="256"
    y="200"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="120"
    font-weight="700"
    fill="#fff0d0"
    text-anchor="middle"
    dominant-baseline="middle"
    style="text-shadow: 0 2px 4px rgba(0,0,0,0.5);"
  >20</text>
</svg>
