name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gm-control-room
    steps:
      # Both repos are checked out side-by-side so the `file:` deps in
      # client/package.json (`file:../../gmcr-srd-systems/packages/*`)
      # resolve at install time. When @gmcr/srd-* are published to npm,
      # this can collapse back to a single checkout.
      - name: Checkout gm-control-room
        uses: actions/checkout@v7
        with:
          path: gm-control-room

      - name: "Checkout gmcr-srd-systems (file: deps)"
        uses: actions/checkout@v7
        with:
          repository: flippelt/gmcr-srd-systems
          path: gmcr-srd-systems

      - uses: actions/setup-node@v7
        with:
          node-version-file: gm-control-room/.nvmrc
          cache: npm
          cache-dependency-path: gm-control-room/package-lock.json

      # Build the SRD packages so their `dist/` (types + js) exists before
      # gm-control-room consumes them via file: protocol. Build `core`
      # first so downstream packages (daggerheart, candela-obscura, etc)
      # can resolve `@lippelt/srd-core` types during their DTS build.
      - name: Build SRD packages
        working-directory: gmcr-srd-systems
        run: |
          npm ci
          npm run build -w packages/core
          npm run build

      - run: npm ci
      - run: npm test
      - run: npm run build
